<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - PT. JOKOWI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="login-body">

  <div class="login-container">
    <div class="login-card text-center">
      <div class="mb-6">
        <i class="fas fa-bolt text-5xl text-teal-400 mb-2"></i>
        <h1 class="text-3xl font-bold text-slate-100">PT. JOKOWI</h1>
        <p class="text-slate-400 text-sm mt-1">Sistem Informasi Karyawan</p>
      </div>

      <form id="loginForm" class="space-y-5 text-left">
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">
            <i class="fas fa-user"></i>
          </span>
          <input type="text" id="username" class="input-field" placeholder="Username" required>
        </div>

        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">
            <i class="fas fa-lock"></i>
          </span>
          <input type="password" id="password" class="input-field" placeholder="Password" required>
        </div>

        <button type="submit" class="w-full bg-teal-500 hover:bg-teal-600 text-slate-900 font-bold py-3 px-6 rounded-full transition duration-300 transform hover:scale-105">
          MASUK
        </button>
      </form>

      <div class="mt-6 bg-slate-800/50 p-3 rounded-xl text-xs text-slate-400">
        <p>💡 <strong>Akun Demo:</strong></p>
        <p>Karyawan: <code>budi</code> / <code>123</code></p>
        <p>Admin: <code>admin</code> / <code>admin123</code></p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
